name: Theme Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Check theme
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Check development environment
        run: npm run doctor

      - name: Run theme checks
        run: npm run check

      - name: Check PHP syntax
        run: find . -path './node_modules' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
